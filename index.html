<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" media="(prefers-color-scheme:light)" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <link rel="stylesheet" media="(prefers-color-scheme:dark)" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" onload="document.documentElement.classList.add('sl-theme-dark');" />
    <link rel="stylesheet" href="css/style.css">

    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <script type="module" src="js/components/start-exercise.js"></script>
    <script type="module" src="js/components/track-exercise.js"></script>
    <script src="js/script.js"></script>

    <title>Workout</title>
</head>

<body>

    <main>

        <sl-card class="workout">

            <div slot="header">
                <h1>Workout</h1>
                <sl-format-date date="2020-07-15T09:17:00-04:00" month="long" day="numeric" year="numeric"></sl-format-date>
            </div>

            <start-exercise></start-exercise>

            <track-exercise></track-exercise>

            <sl-divider></sl-divider>
            <fieldset class="sets">
                <legend>Pullups</legend>
                <div class="set">
                    <div class="repss">
                        <sl-input class="reps" value="12"></sl-input>
                        <sl-input class="reps" value="11"></sl-input>
                        <sl-input class="reps" value="9"></sl-input>
                    </div>

                    <sl-input placeholder="Weight" name="weight" value="120kg"></sl-input>
                </div>

            </fieldset>

            <fieldset class="sets">
                <legend>Pullups</legend>
                <div class="set">
                    <div class="repss">
                        <sl-input class="reps" value="12"></sl-input>
                        <sl-input class="reps" value="11"></sl-input>
                        <sl-input class="reps" value="9"></sl-input>
                    </div>

                    <sl-input placeholder="Weight" name="weight" value="120kg"></sl-input>
                </div>

            </fieldset>

            <div style="display: flex; justify-content: space-between; margin-top: var(--vertical-spacing);">
                <sl-button variant="danger" outline type="reset">Clear</sl-button>
                <sl-button type="submit" variant="primary">Finish</sl-button>
            </div>

    </main>
</body>

</html>

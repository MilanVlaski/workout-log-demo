<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" media="(prefers-color-scheme:light)" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <link rel="stylesheet" media="(prefers-color-scheme:dark)" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" onload="document.documentElement.classList.add('sl-theme-dark');" />
    <link rel="stylesheet" href="css/style.css">

    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <script type="module" src="components/start-exercise.js"></script>

    <title>Workout</title>
</head>

<body>

    <main>

        <sl-card class="workout">

            <div slot="header">
                <h1>Workout</h1>
                <sl-format-date date="2020-07-15T09:17:00-04:00" month="long" day="numeric" year="numeric"></sl-format-date>
            </div>

            <start-exercise label="Start New Exercise" placeholder="Exercise name" action-text="Start"></start-exercise>

            <sl-card class="exercise-form">

                <div slot="header">
                    <h1>Pullups</h1>
                    <sl-icon-button name="x" label="Exit"></sl-icon-button>
                </div>

                <form class="sets">
                    <div class="set">

                        <div class="repss">
                            <sl-input class="reps" name="reps"></sl-input>
                            <sl-button class="reps" variant="primary">
                                <sl-icon name="plus"></sl-icon>
                            </sl-button>

                        </div>

                        <sl-input placeholder="Weight" name="weight" class="weight"></sl-input>
                    </div>

                    <div class="controls">
                        <sl-input label="Number of sets" type="number" placeholder="Sets" value="1" min="1" max="12"></sl-input>
                        <sl-input label="Comment" placeholder="Add a comment?" name="comment"></sl-input>
                        <div class="actions">
                            <div>
                                <sl-button variant="danger" outline type="reset">Clear</sl-button>
                                <sl-button variant="primary" outline>New weight</sl-button>
                            </div>
                            <sl-button type="submit" variant="primary">Finish</sl-button>
                        </div>
                    </div>

                </fieldset>

                </form>

                <sl-divider></sl-divider>
                <fieldset class="sets">
                    <legend>Pullups</legend>
                    <div class="set">
                        <div class="repss">
                            <sl-input class="reps" value="12"></sl-input>
                            <sl-input class="reps" value="11"></sl-input>
                            <sl-input class="reps" value="9"></sl-input>
                        </div>

                        <sl-input placeholder="Weight" name="weight" value="120kg"></sl-input>
                    </div>

                </fieldset>

                <fieldset class="sets">
                    <legend>Pullups</legend>
                    <div class="set">
                        <div class="repss">
                            <sl-input class="reps" value="12"></sl-input>
                            <sl-input class="reps" value="11"></sl-input>
                            <sl-input class="reps" value="9"></sl-input>
                        </div>

                        <sl-input placeholder="Weight" name="weight" value="120kg"></sl-input>
                    </div>

                </fieldset>

                <div style="display: flex; justify-content: space-between; margin-top: var(--vertical-spacing);">
                    <sl-button variant="danger" outline type="reset">Clear</sl-button>
                    <sl-button type="submit" variant="primary">Finish</sl-button>
                </div>

            </sl-card>

    </main>
</body>

</html>

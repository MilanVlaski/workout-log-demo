<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" media="(prefers-color-scheme:light)" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <link rel="stylesheet" media="(prefers-color-scheme:dark)" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" onload="document.documentElement.classList.add('sl-theme-dark');" />
    <link rel="stylesheet" href="css/style.css">

    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>

    <title>Workout</title>
</head>

<body>

    <sl-card class="workout">

        <div slot="header">
            <h1>Workout</h1>
            <sl-format-date date="2020-07-15T09:17:00-04:00"
             month="long" day="numeric" year="numeric"></sl-format-date>
        </div>


        <!-- repeating, of course -->
        <div class="sets-of-exercise">

            <sl-input placeholder="Exercise" name="exercise"></sl-input>

            <div class="sets">

                <!-- repeating, of course-->
                <div class="set">
                    <sl-input placeholder="Reps" name="reps"></sl-input>
                    <sl-input placeholder="Weight" name="weight"></sl-input>
                </div>

                <!-- <div class="set">
                    <sl-input placeholder="Reps" name="reps"></sl-input>
                    <sl-input placeholder="Weight" name="weight"></sl-input>
                </div> -->


            </div>

            <sl-input placeholder="Comment" name="comment"></sl-input>

        </div>

    </sl-card>
</body>

</html>

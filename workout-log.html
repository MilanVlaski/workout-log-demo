<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" media="(prefers-color-scheme:light)" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <link rel="stylesheet" media="(prefers-color-scheme:dark)" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" onload="document.documentElement.classList.add('sl-theme-dark');" />

    <!-- Shoelace components -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/format-date/format-date.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/button/button.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/card/card.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/tooltip/tooltip.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/button-group/button-group.js"></script>






    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/workout-log.css">

    <script type="module" src="./js/components/workout-log/workout-log.js"></script>
    <script type="module" src="./js/components/header.js"></script>
    <title>Workout Log</title>
</head>

<body>
    <mv-header></mv-header>
    <main>
        <workout-log></workout-log>
    </main>

    <template id="workout-log">
        <sl-card class="workout-log">
            <div slot="header">
                <h1>Workout Log</h1>
                <sl-tooltip content="Not available in demo." trigger="click">
                    <sl-button>Export</sl-button>
                </sl-tooltip>
            </div>
            <!-- workouts -->
        </sl-card>
    </template>

    <template id="workout">
        <div class="workout">
            <h2></h2>
            <sl-format-date month="long" day="numeric" year="numeric"></sl-format-date>
            <!-- exercise texts-->
            <div class="actions">
                <sl-tooltip content="Not available in demo." trigger="click">
                    <sl-button size="small">Edit</sl-button>
                </sl-tooltip>
            </div>
        </div>
    </template>

    <template id="exercise">
        <p class="exercise"></p>
    </template>
</body>

</html>
